name: libais CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: [
          '3.12',
          '3.13',
          '3.14',
        ]
    steps:
      - name: Add required sources and pkgs
        run: |
          sudo add-apt-repository --update --yes 'deb http://archive.ubuntu.com/ubuntu/ bionic main universe'
          sudo apt-get install gcc g++

      - name: Checkout repo
        uses: actions/checkout@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v2
        with:
          python-version: ${{ matrix.python-version }}
          architecture: 'x64'

      - name: Before install
        run: |
          uv pip install --system setuptools pytest --upgrade

      - name: Install
        run: CC=g++ uv pip install --system .\[tests\] --upgrade

      - name: Script
        run: |
          mkdir build && cd build && cmake .. && make -j 4 && cd ..
          py.test ais test --cov=ais --cov-report term-missing
